version: 2
updates:
  - package-ecosystem: npm
    directory: /winglowz_site
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      site-npm-non-major:
        patterns:
          - "*"
        update-types:
          - "version-update:semver-minor"
          - "version-update:semver-patch"

  - package-ecosystem: pub
    directory: /winglowz_app
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      flutter-pub-non-major:
        patterns:
          - "*"
        update-types:
          - "version-update:semver-minor"
          - "version-update:semver-patch"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      github-actions:
        patterns:
          - "*"
