version: 2
updates:
  - package-ecosystem: npm
    directory: /winflowz_site
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      site-npm:
        patterns:
          - "*"

  - package-ecosystem: pub
    directory: /winflowz_app
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      flutter-pub:
        patterns:
          - "*"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      github-actions:
        patterns:
          - "*"
