name: Flutter Android CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  changes:
    name: Detect APK-impacting changes
    runs-on: ubuntu-latest
    outputs:
      apk: ${{ steps.filter.outputs.apk }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Detect changed paths
        id: filter
        uses: dorny/paths-filter@v4
        with:
          filters: |
            apk:
              - 'android/**'
              - 'lib/**'
              - 'pubspec.yaml'
              - 'pubspec.lock'
              - '.github/workflows/android-build.yml'

  analyze:
    name: Flutter Analyze
    runs-on: blacksmith-2vcpu-ubuntu-2404
    timeout-minutes: 20

    steps:
      - name: Configure Git default branch
        run: git config --global init.defaultBranch main

      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Resolve dependencies
        run: flutter pub get

      - name: Static analysis
        run: flutter analyze

  test:
    name: Flutter Test
    runs-on: blacksmith-2vcpu-ubuntu-2404
    timeout-minutes: 25

    steps:
      - name: Configure Git default branch
        run: git config --global init.defaultBranch main

      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Resolve dependencies
        run: flutter pub get

      - name: Run tests
        run: flutter test

  firebase_auth_config:
    name: Validate Firebase Auth Config
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs:
      - changes
    if: github.event_name != 'pull_request' || needs.changes.outputs.apk == 'true'
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Authenticate to Google Cloud via OIDC
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_WIF_SERVICE_ACCOUNT }}
          project_id: ${{ secrets.FIREBASE_PROJECT_ID }}
          create_credentials_file: true

      - name: Set up Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v3

      - name: Verify Firebase Auth is configured
        env:
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
        run: |
          if [ -z "$FIREBASE_PROJECT_ID" ]; then
            echo "::error::Missing FIREBASE_PROJECT_ID."
            exit 1
          fi

          missing_services=()
          for service in identitytoolkit.googleapis.com securetoken.googleapis.com; do
            if ! gcloud services list --enabled --project "$FIREBASE_PROJECT_ID" --filter="config.name:${service}" --format="value(config.name)" | grep -qx "$service"; then
              missing_services+=("$service")
            fi
          done
          if [ "${#missing_services[@]}" -gt 0 ]; then
            echo "::error::Firebase Auth services are not enabled on ${FIREBASE_PROJECT_ID}: ${missing_services[*]}"
            exit 1
          fi

          http_status="$(
            curl --silent --show-error --output /tmp/firebase-auth-config.json --write-out "%{http_code}" \
              -H "Authorization: Bearer $(gcloud auth print-access-token)" \
              -H "x-goog-user-project: ${FIREBASE_PROJECT_ID}" \
              "https://identitytoolkit.googleapis.com/admin/v2/projects/${FIREBASE_PROJECT_ID}/config"
          )"
          if [ "$http_status" != "200" ]; then
            echo "::error::Firebase Auth config is not readable for ${FIREBASE_PROJECT_ID}; enable Firebase Authentication and its sign-in providers before building the APK."
            exit 1
          fi

  build_apk:
    name: Build Debug APK
    runs-on: blacksmith-2vcpu-ubuntu-2404
    timeout-minutes: 45
    needs:
      - changes
      - analyze
      - test
      - firebase_auth_config
    if: github.event_name != 'pull_request' || needs.changes.outputs.apk == 'true'

    steps:
      - name: Configure Git default branch
        run: git config --global init.defaultBranch main

      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Resolve dependencies
        run: flutter pub get

      - name: Cache Gradle
        uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Build debug APK
        env:
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_DEV_API_KEY: ${{ secrets.FIREBASE_DEV_API_KEY }}
          FIREBASE_DEV_APP_ID: ${{ secrets.FIREBASE_DEV_APP_ID }}
          FIREBASE_DEV_MESSAGING_SENDER_ID: ${{ secrets.FIREBASE_DEV_MESSAGING_SENDER_ID }}
          FIREBASE_DEV_AUTH_DOMAIN: ${{ secrets.FIREBASE_DEV_AUTH_DOMAIN }}
          FIREBASE_DEV_STORAGE_BUCKET: ${{ secrets.FIREBASE_DEV_STORAGE_BUCKET }}
          FIREBASE_WEB_CLIENT_ID: ${{ secrets.FIREBASE_WEB_CLIENT_ID || vars.FIREBASE_WEB_CLIENT_ID }}
          SUITE_IDENTITY_BRIDGE_URL: ${{ secrets.SUITE_IDENTITY_BRIDGE_URL }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          SENTRY_ENVIRONMENT: ${{ secrets.SENTRY_ENVIRONMENT }}
        run: |
          missing_firebase=()
          for name in FIREBASE_PROJECT_ID FIREBASE_DEV_API_KEY FIREBASE_DEV_APP_ID FIREBASE_DEV_MESSAGING_SENDER_ID FIREBASE_WEB_CLIENT_ID; do
            if [ -z "${!name}" ]; then
              missing_firebase+=("$name")
            fi
          done
          if [ "${#missing_firebase[@]}" -gt 0 ]; then
            echo "::error::Missing Firebase build secrets or variables: ${missing_firebase[*]}"
            exit 1
          fi
          if [ -z "$SENTRY_DSN" ]; then
            echo "Sentry DSN is missing; crash reporting stays disabled."
            SENTRY_DSN=""
          fi
          if [ -z "$SENTRY_ENVIRONMENT" ]; then
            SENTRY_ENVIRONMENT="debug"
          fi

          flutter build apk --debug \
            --dart-define=FIREBASE_PROJECT_ID="$FIREBASE_PROJECT_ID" \
            --dart-define=FIREBASE_DEV_API_KEY="$FIREBASE_DEV_API_KEY" \
            --dart-define=FIREBASE_DEV_APP_ID="$FIREBASE_DEV_APP_ID" \
            --dart-define=FIREBASE_DEV_MESSAGING_SENDER_ID="$FIREBASE_DEV_MESSAGING_SENDER_ID" \
            --dart-define=FIREBASE_DEV_AUTH_DOMAIN="$FIREBASE_DEV_AUTH_DOMAIN" \
            --dart-define=FIREBASE_DEV_STORAGE_BUCKET="$FIREBASE_DEV_STORAGE_BUCKET" \
            --dart-define=FIREBASE_WEB_CLIENT_ID="$FIREBASE_WEB_CLIENT_ID" \
            --dart-define=SUITE_IDENTITY_BRIDGE_URL="$SUITE_IDENTITY_BRIDGE_URL" \
            --dart-define=SENTRY_DSN="$SENTRY_DSN" \
            --dart-define=SENTRY_ENVIRONMENT="$SENTRY_ENVIRONMENT" \
            --dart-define=WINFLOWZ_APP_BUILD_SHA="${GITHUB_SHA}" \
            --dart-define=WINFLOWZ_APP_BUILD_RUN_ID="${GITHUB_RUN_ID}" \
            --dart-define=WINFLOWZ_APP_BUILD_REF="${GITHUB_REF_NAME}"

      - name: Verify debug APK exists
        run: test -f build/app/outputs/flutter-apk/app-debug.apk

      - name: Upload APK
        uses: actions/upload-artifact@v7
        with:
          name: winflowz_app-debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
          if-no-files-found: ignore
          retention-days: 14

  firebase:
    name: Deploy Firestore Rules and Indexes
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Configure Git default branch
        run: git config --global init.defaultBranch main

      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Authenticate to Google Cloud via OIDC
        id: gcp-auth
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_WIF_SERVICE_ACCOUNT }}
          project_id: ${{ secrets.FIREBASE_PROJECT_ID }}
          create_credentials_file: true

      - name: Install Firebase CLI
        run: npm install --global firebase-tools@15.17.0

      - name: Validate Firebase project secret
        env:
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          GCP_WIF_PROVIDER: ${{ secrets.GCP_WIF_PROVIDER }}
          GCP_WIF_SERVICE_ACCOUNT: ${{ secrets.GCP_WIF_SERVICE_ACCOUNT }}
        run: |
          test -n "$FIREBASE_PROJECT_ID"
          test -n "$GCP_WIF_PROVIDER"
          test -n "$GCP_WIF_SERVICE_ACCOUNT"
          test -n "$GOOGLE_APPLICATION_CREDENTIALS"
          test -f "$GOOGLE_APPLICATION_CREDENTIALS"

      - name: Deploy Firestore rules and indexes
        env:
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
        run: firebase deploy --only firestore --project "$FIREBASE_PROJECT_ID" --non-interactive
