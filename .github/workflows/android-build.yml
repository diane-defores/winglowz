name: WinGlowz Android Checks and Manual APK

on:
  push:
    branches: [dev, main]
    paths:
      - "winglowz_app/lib/**"
      - "winglowz_app/test/**"
      - "winglowz_app/android/**"
      - "winglowz_app/assets/**"
      - "winglowz_app/scripts/**"
      - "winglowz_app/firebase.json"
      - "winglowz_app/firestore.indexes.json"
      - "winglowz_app/firestore.rules"
      - "winglowz_app/pubspec.yaml"
      - "winglowz_app/pubspec.lock"
      - "winglowz_app/analysis_options.yaml"
      - "winglowz_app/vercel.json"
      - ".github/workflows/android-build.yml"
  pull_request:
    branches: [dev, main]
    paths:
      - "winglowz_app/lib/**"
      - "winglowz_app/test/**"
      - "winglowz_app/android/**"
      - "winglowz_app/assets/**"
      - "winglowz_app/scripts/**"
      - "winglowz_app/firebase.json"
      - "winglowz_app/firestore.indexes.json"
      - "winglowz_app/firestore.rules"
      - "winglowz_app/pubspec.yaml"
      - "winglowz_app/pubspec.lock"
      - "winglowz_app/analysis_options.yaml"
      - "winglowz_app/vercel.json"
      - ".github/workflows/android-build.yml"
  workflow_dispatch:

concurrency:
  group: flutter-android-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  environment:
    name: Select environment
    runs-on: ubuntu-latest
    outputs:
      branch_environment: ${{ steps.select.outputs.branch_environment }}
      firebase_project_id_secret: ${{ steps.select.outputs.firebase_project_id_secret }}
      firebase_api_key_secret: ${{ steps.select.outputs.firebase_api_key_secret }}
      firebase_app_id_secret: ${{ steps.select.outputs.firebase_app_id_secret }}
      firebase_messaging_sender_id_secret: ${{ steps.select.outputs.firebase_messaging_sender_id_secret }}
      firebase_auth_domain_secret: ${{ steps.select.outputs.firebase_auth_domain_secret }}
      firebase_storage_bucket_secret: ${{ steps.select.outputs.firebase_storage_bucket_secret }}
      firebase_web_client_id_secret: ${{ steps.select.outputs.firebase_web_client_id_secret }}
      gcp_wif_provider_secret: ${{ steps.select.outputs.gcp_wif_provider_secret }}
      gcp_wif_service_account_secret: ${{ steps.select.outputs.gcp_wif_service_account_secret }}
    steps:
      - name: Select branch environment
        id: select
        run: |
          if [ "${GITHUB_EVENT_NAME}" = "pull_request" ]; then
            branch_name="${GITHUB_BASE_REF}"
          else
            branch_name="${GITHUB_REF_NAME}"
          fi
          case "$branch_name" in
            main)
              {
                echo "branch_environment=prod"
                echo "firebase_project_id_secret=PROD_FIREBASE_PROJECT_ID"
                echo "firebase_api_key_secret=PROD_FIREBASE_API_KEY"
                echo "firebase_app_id_secret=PROD_FIREBASE_APP_ID"
                echo "firebase_messaging_sender_id_secret=PROD_FIREBASE_MESSAGING_SENDER_ID"
                echo "firebase_auth_domain_secret=PROD_FIREBASE_AUTH_DOMAIN"
                echo "firebase_storage_bucket_secret=PROD_FIREBASE_STORAGE_BUCKET"
                echo "firebase_web_client_id_secret=PROD_FIREBASE_WEB_CLIENT_ID"
                echo "gcp_wif_provider_secret=PROD_GCP_WIF_PROVIDER"
                echo "gcp_wif_service_account_secret=PROD_GCP_WIF_SERVICE_ACCOUNT"
              } >> "$GITHUB_OUTPUT"
              ;;
            dev)
              {
                echo "branch_environment=dev"
                echo "firebase_project_id_secret=DEV_FIREBASE_PROJECT_ID"
                echo "firebase_api_key_secret=DEV_FIREBASE_API_KEY"
                echo "firebase_app_id_secret=DEV_FIREBASE_APP_ID"
                echo "firebase_messaging_sender_id_secret=DEV_FIREBASE_MESSAGING_SENDER_ID"
                echo "firebase_auth_domain_secret=DEV_FIREBASE_AUTH_DOMAIN"
                echo "firebase_storage_bucket_secret=DEV_FIREBASE_STORAGE_BUCKET"
                echo "firebase_web_client_id_secret=DEV_FIREBASE_WEB_CLIENT_ID"
                echo "gcp_wif_provider_secret=DEV_GCP_WIF_PROVIDER"
                echo "gcp_wif_service_account_secret=DEV_GCP_WIF_SERVICE_ACCOUNT"
              } >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "::error::Unsupported branch for Android CI: ${branch_name}. Use dev or main."
              exit 1
              ;;
          esac

  changes:
    name: Detect APK-impacting changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      apk: ${{ steps.filter.outputs.apk }}
      firestore: ${{ steps.filter.outputs.firestore }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Detect changed paths
        id: filter
        uses: dorny/paths-filter@v4
        with:
          filters: |
            apk:
              - 'winglowz_app/lib/**'
              - 'winglowz_app/test/**'
              - 'winglowz_app/android/**'
              - 'winglowz_app/assets/**'
              - 'winglowz_app/scripts/**'
              - 'winglowz_app/firebase.json'
              - 'winglowz_app/firestore.indexes.json'
              - 'winglowz_app/firestore.rules'
              - 'winglowz_app/pubspec.yaml'
              - 'winglowz_app/pubspec.lock'
              - 'winglowz_app/analysis_options.yaml'
              - 'winglowz_app/vercel.json'
              - '.github/workflows/android-build.yml'
            firestore:
              - 'winglowz_app/firebase.json'
              - 'winglowz_app/firestore.indexes.json'
              - 'winglowz_app/firestore.rules'
              - '.github/workflows/android-build.yml'

  flutter_checks:
    name: Android checks
    runs-on: blacksmith-2vcpu-ubuntu-2404
    timeout-minutes: 60
    needs:
      - environment
      - changes
    if: github.event_name != 'pull_request' || needs.changes.outputs.apk == 'true'

    steps:
      - name: Configure Git default branch
        run: git config --global init.defaultBranch main

      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version-file: winglowz_app/pubspec.yaml
          cache: true

      - name: Resolve dependencies
        working-directory: winglowz_app
        run: flutter pub get

      - name: Static analysis
        working-directory: winglowz_app
        run: flutter analyze

      - name: Run tests
        working-directory: winglowz_app
        run: flutter test

  firebase_auth_config:
    name: Manual APK preflight
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.event_name == 'workflow_dispatch'
    permissions:
      contents: read
      id-token: write
    needs:
      - environment

    steps:
      - name: Authenticate to Google Cloud via OIDC
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets[needs.environment.outputs.gcp_wif_provider_secret] }}
          service_account: ${{ secrets[needs.environment.outputs.gcp_wif_service_account_secret] }}
          project_id: ${{ secrets[needs.environment.outputs.firebase_project_id_secret] }}
          create_credentials_file: true

      - name: Set up Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v3

      - name: Verify Firebase Auth is configured
        env:
          FIREBASE_PROJECT_ID: ${{ secrets[needs.environment.outputs.firebase_project_id_secret] }}
        run: |
          if [ -z "$FIREBASE_PROJECT_ID" ]; then
            echo "::error::Missing FIREBASE_PROJECT_ID."
            exit 1
          fi

          missing_services=()
          for service in identitytoolkit.googleapis.com securetoken.googleapis.com; do
            if ! gcloud services list --enabled --project "$FIREBASE_PROJECT_ID" --filter="config.name:${service}" --format="value(config.name)" | grep -qx "$service"; then
              missing_services+=("$service")
            fi
          done
          if [ "${#missing_services[@]}" -gt 0 ]; then
            echo "::error::Firebase Auth services are not enabled on ${FIREBASE_PROJECT_ID}: ${missing_services[*]}"
            exit 1
          fi

          http_status="$(
            curl --silent --show-error --output /tmp/firebase-auth-config.json --write-out "%{http_code}" \
              -H "Authorization: Bearer $(gcloud auth print-access-token)" \
              -H "x-goog-user-project: ${FIREBASE_PROJECT_ID}" \
              "https://identitytoolkit.googleapis.com/admin/v2/projects/${FIREBASE_PROJECT_ID}/config"
          )"
          if [ "$http_status" != "200" ]; then
            echo "::error::Firebase Auth config is not readable for ${FIREBASE_PROJECT_ID}; enable Firebase Authentication and its sign-in providers before building the APK."
            exit 1
          fi

  build_debug_apk:
    name: Manual debug APK build
    runs-on: blacksmith-2vcpu-ubuntu-2404
    timeout-minutes: 60
    needs:
      - environment
      - flutter_checks
      - firebase_auth_config
    if: github.event_name == 'workflow_dispatch'

    steps:
      - name: Configure Git default branch
        run: git config --global init.defaultBranch main

      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version-file: winglowz_app/pubspec.yaml
          cache: true

      - name: Resolve dependencies
        working-directory: winglowz_app
        run: flutter pub get

      - name: Build debug APK
        working-directory: winglowz_app
        env:
          FIREBASE_PROJECT_ID: ${{ secrets[needs.environment.outputs.firebase_project_id_secret] }}
          FIREBASE_API_KEY: ${{ secrets[needs.environment.outputs.firebase_api_key_secret] }}
          FIREBASE_APP_ID: ${{ secrets[needs.environment.outputs.firebase_app_id_secret] }}
          FIREBASE_MESSAGING_SENDER_ID: ${{ secrets[needs.environment.outputs.firebase_messaging_sender_id_secret] }}
          FIREBASE_AUTH_DOMAIN: ${{ secrets[needs.environment.outputs.firebase_auth_domain_secret] }}
          FIREBASE_STORAGE_BUCKET: ${{ secrets[needs.environment.outputs.firebase_storage_bucket_secret] }}
          FIREBASE_WEB_CLIENT_ID: ${{ secrets[needs.environment.outputs.firebase_web_client_id_secret] }}
          SUITE_IDENTITY_BRIDGE_URL: ${{ secrets.SUITE_IDENTITY_BRIDGE_URL }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          SENTRY_ENVIRONMENT: ${{ secrets.SENTRY_ENVIRONMENT }}
        run: |
          missing_firebase=()
          for name in FIREBASE_PROJECT_ID FIREBASE_API_KEY FIREBASE_APP_ID FIREBASE_MESSAGING_SENDER_ID FIREBASE_WEB_CLIENT_ID; do
            if [ -z "${!name}" ]; then
              missing_firebase+=("$name")
            fi
          done
          if [ "${#missing_firebase[@]}" -gt 0 ]; then
            echo "::error::Missing Firebase build secrets or variables: ${missing_firebase[*]}"
            exit 1
          fi
          if [ -z "$SENTRY_DSN" ]; then
            echo "Sentry DSN is missing; crash reporting stays disabled."
            SENTRY_DSN=""
          fi
          if [ -z "$SENTRY_ENVIRONMENT" ]; then
            SENTRY_ENVIRONMENT="debug"
          fi

          flutter build apk --debug \
            --dart-define=FIREBASE_PROJECT_ID="$FIREBASE_PROJECT_ID" \
            --dart-define=FIREBASE_API_KEY="$FIREBASE_API_KEY" \
            --dart-define=FIREBASE_APP_ID="$FIREBASE_APP_ID" \
            --dart-define=FIREBASE_MESSAGING_SENDER_ID="$FIREBASE_MESSAGING_SENDER_ID" \
            --dart-define=FIREBASE_AUTH_DOMAIN="$FIREBASE_AUTH_DOMAIN" \
            --dart-define=FIREBASE_STORAGE_BUCKET="$FIREBASE_STORAGE_BUCKET" \
            --dart-define=FIREBASE_WEB_CLIENT_ID="$FIREBASE_WEB_CLIENT_ID" \
            --dart-define=SUITE_IDENTITY_BRIDGE_URL="$SUITE_IDENTITY_BRIDGE_URL" \
            --dart-define=SENTRY_DSN="$SENTRY_DSN" \
            --dart-define=SENTRY_ENVIRONMENT="$SENTRY_ENVIRONMENT" \
            --dart-define=WINGLOWZ_APP_BUILD_SHA="${GITHUB_SHA}" \
            --dart-define=WINGLOWZ_APP_BUILD_RUN_ID="${GITHUB_RUN_ID}" \
            --dart-define=WINGLOWZ_APP_BUILD_REF="${GITHUB_REF_NAME}"

      - name: Verify debug APK exists
        run: test -f winglowz_app/build/app/outputs/flutter-apk/app-debug.apk

      - name: Upload APK
        uses: actions/upload-artifact@v7
        with:
          name: winglowz_app-debug-apk
          path: winglowz_app/build/app/outputs/flutter-apk/app-debug.apk
          if-no-files-found: ignore
          retention-days: 1

  firebase:
    name: Firestore deploy
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs:
      - environment
      - changes
    if: github.event_name == 'workflow_dispatch' || ((github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev') && needs.changes.outputs.firestore == 'true')
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Configure Git default branch
        run: git config --global init.defaultBranch main

      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Authenticate to Google Cloud via OIDC
        id: gcp-auth
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets[needs.environment.outputs.gcp_wif_provider_secret] }}
          service_account: ${{ secrets[needs.environment.outputs.gcp_wif_service_account_secret] }}
          project_id: ${{ secrets[needs.environment.outputs.firebase_project_id_secret] }}
          create_credentials_file: true

      - name: Install Firebase CLI
        run: npm install --global firebase-tools@15.17.0

      - name: Validate Firebase project secret
        env:
          FIREBASE_PROJECT_ID: ${{ secrets[needs.environment.outputs.firebase_project_id_secret] }}
          GCP_WIF_PROVIDER: ${{ secrets[needs.environment.outputs.gcp_wif_provider_secret] }}
          GCP_WIF_SERVICE_ACCOUNT: ${{ secrets[needs.environment.outputs.gcp_wif_service_account_secret] }}
        run: |
          test -n "$FIREBASE_PROJECT_ID"
          test -n "$GCP_WIF_PROVIDER"
          test -n "$GCP_WIF_SERVICE_ACCOUNT"
          test -n "$GOOGLE_APPLICATION_CREDENTIALS"
          test -f "$GOOGLE_APPLICATION_CREDENTIALS"

      - name: Deploy Firestore rules and indexes
        working-directory: winglowz_app
        env:
          FIREBASE_PROJECT_ID: ${{ secrets[needs.environment.outputs.firebase_project_id_secret] }}
        run: firebase deploy --only firestore --project "$FIREBASE_PROJECT_ID" --non-interactive
