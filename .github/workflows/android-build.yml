name: Flutter Android CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    name: Analyze, Test, Build APK
    runs-on: blacksmith-2vcpu-ubuntu-2404
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Resolve dependencies
        run: flutter pub get

      - name: Static analysis
        run: flutter analyze

      - name: Run tests
        run: flutter test

      - name: Build debug APK
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_PUBLISHABLE_KEY: ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}
        run: |
          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_PUBLISHABLE_KEY" ]; then
            echo "Missing GitHub Actions secrets: SUPABASE_URL and SUPABASE_PUBLISHABLE_KEY." >&2
            exit 1
          fi

          flutter build apk --debug \
            --dart-define=SUPABASE_URL="$SUPABASE_URL" \
            --dart-define=SUPABASE_PUBLISHABLE_KEY="$SUPABASE_PUBLISHABLE_KEY"

      - name: Upload APK
        uses: actions/upload-artifact@v7
        with:
          name: voiceflowz-debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 14

  supabase:
    name: Supabase Migration Tests
    runs-on: blacksmith-2vcpu-ubuntu-2404
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Supabase CLI
        uses: supabase/setup-cli@v2
        with:
          version: 2.90.0

      - name: Start local Supabase and apply migrations
        run: supabase start

      - name: Lint local database
        run: supabase db lint --local

      - name: Run RLS smoke tests
        run: supabase test db supabase/tests/rls_smoke.sql

      - name: Stop local Supabase services
        if: always()
        run: supabase stop --no-backup
