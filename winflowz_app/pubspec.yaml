name: winflowz_app
description: "WinFlowz Flutter Android-first app with backend-agnostic data contracts."
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^3.0.3
  go_router: ^16.2.5
  supabase_flutter: ^2.10.4
  flutter_secure_storage: ^10.0.0-beta.4
  permission_handler: ^12.0.1
  record: ^6.1.2
  speech_to_text: ^7.3.0
  uuid: ^4.5.1
  crypto: ^3.0.7
  firebase_core: ^4.7.0
  firebase_auth: ^6.4.0
  cloud_firestore: ^6.3.0
  google_sign_in: ^7.2.0
  google_sign_in_web: ^1.1.3
  sentry_flutter: ^9.20.0
  http: ^1.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
          weight: 400
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700
