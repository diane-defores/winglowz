name: winflowz_app
description: "WinFlowz Flutter Android-first app with backend-agnostic data contracts."
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ^3.11.3
  flutter: 3.41.7

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  # Active runtime and shared UI dependencies.
  flutter_riverpod: ^3.3.2
  go_router: ^17.3.0
  flutter_secure_storage: ^10.3.1
  permission_handler: ^12.0.3
  record: ^6.2.1
  speech_to_text: ^7.4.0
  uuid: ^4.5.1
  crypto: ^3.0.7
  firebase_core: ^4.10.0
  firebase_auth: ^6.5.2
  cloud_firestore: ^6.5.0
  firebase_storage: ^13.4.2
  google_sign_in: ^7.2.0
  google_sign_in_web: ^1.1.3
  sentry_flutter: ^9.22.0
  http: ^1.5.0

  # Legacy compile-compat debt. Do not refresh opportunistically without a
  # dedicated retirement or isolation spec.
  supabase_flutter: ^2.10.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
          weight: 400
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700
